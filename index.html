<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MADXROHIT FULL PRO</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f6fb;
    transition:0.3s;
}

body.dark{
    background:#0f172a;
    color:white;
}

.header{
    text-align:center;
    padding:18px;
    font-size:20px;
    font-weight:bold;
    background:linear-gradient(135deg,#ff512f,#dd2476);
    color:white;
}

.topbar{
    display:flex;
    gap:10px;
    padding:10px;
}

input{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

.darkBtn{
    background:#111;
    color:white;
    border:none;
    padding:10px;
    border-radius:10px;
}

.social{
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
}

.social a{
    padding:10px 14px;
    border-radius:10px;
    color:white;
    text-decoration:none;
    font-size:13px;
    font-weight:bold;
}

.telegram{background:#229ED9;}
.whatsapp{background:#25D366;}

.container{
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.card{
    display:flex;
    gap:12px;
    padding:12px;
    border-radius:15px;
    background:white;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

body.dark .card{
    background:#1e293b;
}

.card img{
    width:55px;
    height:55px;
    border-radius:12px;
}

.name{font-weight:bold;}
.tag{font-size:12px;color:gray;}

.btn{
    display:inline-block;
    margin-top:6px;
    padding:7px 12px;
    border-radius:8px;
    background:#4f46e5;
    color:white;
    font-size:12px;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="header">🚀 MADXROHIT ALL APPS</div>

<div class="topbar">
    <input type="text" id="search" placeholder="Search apps...">
    <button class="darkBtn" onclick="toggleDark()">🌙</button>
</div>

<div class="social">
    <a class="telegram" href="https://t.me/Study_group_App" target="_blank">Telegram</a>
    <a class="whatsapp" href="https://whatsapp.com/channel/0029Vb6FhReEquiLz1jNH00o" target="_blank">WhatsApp</a>
</div>

<div class="container" id="app"></div>

<script>
const data = {
 "apps": [ 
    { "name":"KHAN GLOBAL STUDIES","image":"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTuCiwfy76ica73byqKIURXqN2Zi2h2Sdw0VJooGkXsyg&s","study_link":"https://spidykgs.vercel.app","tag":"Popular"},
    { "name":"SELECTION WAY","image":"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRquIqVyakcgsPuAsFkSm34nPLKZ_IY2W0-Rj5sd1-T-g&s=10","study_link":"https://spidyway.vercel.app","tag":"Popular"}
 ]
};

function render(list){
    const app = document.getElementById("app");
    app.innerHTML="";
    list.forEach(a=>{
        app.innerHTML+=`
        <div class="card">
            <img src="${a.image}">
            <div>
                <div class="name">${a.name}</div>
                <div class="tag">${a.tag}</div>
                <a class="btn" href="${a.study_link}" target="_blank">Study</a>
            </div>
        </div>`;
    });
}
render(data.apps);

document.getElementById("search").addEventListener("input",function(){
    let v=this.value.toLowerCase();
    render(data.apps.filter(a=>a.name.toLowerCase().includes(v)));
});

function toggleDark(){
    document.body.classList.toggle("dark");
}
</script>

<!-- 🔥 FIREBASE ADDED (WORKING COMPAT VERSION) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
  };

  firebase.initializeApp(firebaseConfig);
</script>

</body>
</html>
